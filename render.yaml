# render.yaml — the entire deployment, declared in one file.
# Push to GitHub, then in Render: New > Blueprint, point at the repo.
#
# Secrets are defined ONCE in the `atlas-secrets` env group below; Render prompts
# for each `sync: false` value during blueprint creation. Every service then
# pulls them via `fromGroup: atlas-secrets`.
#
# FREE TIER: the API, UI, and Postgres run on Render's free plan. Note:
#   - Free web services spin down after ~15 min idle (slow first request).
#   - Free Postgres is time-limited by Render and has no automatic backups.
#   - Background workers and cron jobs are NOT available on free — they are
#     commented out below. Run them manually instead:
#         python -m worker.sync                 # one-off inbox sync
#         python -m worker.sync --refresh-style # rebuild the style corpus
#     (or restore them and switch plans to "starter" on a paid account).
databases:
  - name: atlas-db
    plan: free
    postgresMajorVersion: "16"   # enable pgvector via: CREATE EXTENSION vector;

envVarGroups:
  - name: atlas-secrets
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false              # https://<api-service>.onrender.com/oauth/callback
      - key: TOKEN_ENC_KEY
        sync: false              # Fernet key for encrypting OAuth tokens
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false

services:
  - type: web
    name: atlas-inbox-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true             # deploy on push to main
    envVars:
      - fromGroup: atlas-secrets
      - key: LANGFUSE_HOST
        value: https://cloud.langfuse.com
      # Relax oauthlib scope-order check (needed with multiple Google scopes).
      - key: OAUTHLIB_RELAX_TOKEN_SCOPE
        value: "1"
      # Timezone for date reasoning + scheduling (change to your zone).
      - key: ATLAS_TIMEZONE
        value: Asia/Kolkata
      - key: DATABASE_URL
        fromDatabase:
          name: atlas-db
          property: connectionString

  - type: web                    # Streamlit approval-queue + chat UI
    name: atlas-inbox-ui
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run ui/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: ATLAS_API_BASE
        # Set to the API service's PUBLIC URL after it deploys, e.g.
        # https://atlas-inbox-api.onrender.com  (fromService 'host' returns the
        # internal name, which isn't reachable on free-tier public services).
        sync: false
      - key: ATLAS_DEFAULT_USER_ID
        value: me

  # --- Paid-plan only: background worker + cron (Render free tier excludes these).
  # Uncomment and set plan: starter on a paid account to enable automatic inbox
  # sync and nightly style-corpus refresh.
  #
  # - type: worker                 # inbox sync (long-running consumer)
  #   name: atlas-inbox-sync
